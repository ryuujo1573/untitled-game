<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>untitled-game</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body
    class="bg-black overflow-hidden h-full w-full touch-none"
    data-app-mode="title"
  >
    <canvas id="webglCanvas" tabindex="-1" contenteditable="false"></canvas>

    <!-- Invisible Input to trap IME -->
    <input
      type="text"
      id="ime-trap"
      style="position: absolute; opacity: 0; pointer-events: none; z-index: -1"
      readonly
    />

    <!-- Crosshair (text-shadow applied via CSS rule) -->
    <div id="crosshair">+</div>

    <!-- 3-D compass: shown in F3 mode, replaces crosshair -->
    <canvas
      id="debug-compass"
      width="96"
      height="96"
      style="display: none"
    ></canvas>

    <!-- Hotbar: current held block (updated by InputManager) -->
    <div
      id="hotbar"
      class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black/55 text-white font-mono text-[15px] px-4 py-1.5 rounded-md pointer-events-none select-none z-10"
    >
      Block: Dirt&nbsp;&nbsp;<kbd class="kbd kbd-sm">E</kbd>&nbsp;to cycle
    </div>

    <!-- Control hints -->
    <div
      id="help"
      class="fixed bottom-2.5 left-1/2 -translate-x-1/2 text-white/55 font-mono text-xs pointer-events-none select-none z-10 flex items-center gap-1"
    >
      <kbd class="kbd kbd-xs">W</kbd><kbd class="kbd kbd-xs">A</kbd
      ><kbd class="kbd kbd-xs">S</kbd><kbd class="kbd kbd-xs">D</kbd>
      move &nbsp;·&nbsp;
      <kbd class="kbd kbd-xs">Space</kbd> jump &nbsp;·&nbsp; LMB break
      &nbsp;·&nbsp; RMB place &nbsp;·&nbsp;
      <kbd class="kbd kbd-xs">E</kbd> cycle block &nbsp;·&nbsp;
      <kbd class="kbd kbd-xs">F3</kbd> debug
    </div>

    <!-- Solid.js mount point for PauseMenu overlay -->
    <div id="pause-root"></div>
    <div id="chat-root"></div>
    <div id="title-root"></div>
    <div
      id="version-root"
      class="absolute top-0 right-0 m-2 p-2 bg-amber-500/10 text-white rounded-xl"
    >
      %VITE_VERSION% (%VITE_GIT_HASH%)
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
