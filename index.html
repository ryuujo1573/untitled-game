<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="WebGL-Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxxer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <canvas id="webglCanvas"></canvas>
    <div id="crosshair">+</div>
    <canvas
      id="debug-compass"
      width="96"
      height="96"
      style="display: none"
    ></canvas>
    <div id="hotbar">Block: Dirt [E] to cycle</div>
    <div id="help">
      WASD move · Space jump · LMB break · RMB place · E cycle block · F3 debug
    </div>
    <!-- F3 debug overlay (hidden until F3 is pressed) -->
    <div id="debug-panel" style="display: none">
      <pre id="debug-text"></pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
